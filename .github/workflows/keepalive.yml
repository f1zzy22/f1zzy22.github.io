name: Supabase Keep Alive

on:
  schedule:
    # Runs every 5 days at midnight UTC
    - cron: '0 0 */5 * *'
  workflow_dispatch: # Allows you to manually trigger it from the Actions tab

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent project pause
        run: |
          curl -s -o /dev/null -w "Status Code: %{http_code}\n" \
          "https://vefnwnxghpcgajiurufx.supabase.co/rest/v1/typing_scores?select=wpm&limit=1" \
          -H "apikey: sb_publishable_hcvPkj-rK8vtA1hI1TZF4g_pufYZQLk" \
          -H "Authorization: Bearer sb_publishable_hcvPkj-rK8vtA1hI1TZF4g_pufYZQLk"
